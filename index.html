<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JO-TRANS | OCR Dot-Matrix Jotun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between antialiased">

    <header class="bg-slate-800 p-4 border-b border-slate-700 text-center">
        <h1 class="text-sm font-black tracking-wider text-blue-400 uppercase">
            <i class="fas fa-print mr-1.5"></i> DOT-MATRIX DT SCANNER
        </h1>
        <p class="text-[10px] text-slate-400 mt-1">Sistem Pemindai Angka Pengiriman PT Jotun</p>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4">
        
        <div class="relative w-full max-w-sm aspect-[4/3] bg-black rounded-2xl overflow-hidden border-2 border-slate-700 shadow-2xl flex items-center justify-center">
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
            
            <div class="absolute inset-x-6 h-20 border-2 border-dashed border-emerald-500 rounded-lg bg-emerald-500/5 flex flex-col items-center justify-between pointer-events-none p-1">
                <span class="text-[9px] text-emerald-400 font-bold uppercase tracking-wider bg-slate-900/80 px-1.5 py-0.5 rounded">Posisikan Tulisan "DT NO" Di Sini</span>
                <div class="w-full h-0.5 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse"></div>
            </div>

            <div id="ocrLoader" class="hidden absolute inset-0 bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center gap-3">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-xs font-bold text-blue-400 tracking-wider uppercase animate-pulse">Mengekstrak Angka Dot-Matrix...</span>
            </div>
        </div>

        <div class="mt-3 text-center">
            <span class="text-[9px] text-slate-500 block mb-1">Preview Pembersihan Gambar AI (Hitam Putih Pekat):</span>
            <canvas id="captureCanvas" class="mx-auto rounded-lg border border-slate-700 max-w-[150px] bg-white"></canvas>
        </div>

        <div class="w-full max-w-sm mt-4 bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-2">
            <div>
                <span class="text-[10px] font-bold text-slate-400 uppercase block">Nomor DT Terdeteksi:</span>
                <div id="resultText" class="text-xl font-black tracking-widest text-emerald-400 bg-slate-950/60 p-2.5 rounded-lg border border-slate-900 text-center min-h-[48px] flex items-center justify-center">
                    Belum ada data
                </div>
            </div>
            <div>
                <span class="text-[9px] font-medium text-slate-500 block">Mentahan teks terbaca AI:</span>
                <div id="rawLog" class="text-[10px] text-slate-400 font-mono bg-slate-900 p-1.5 rounded max-h-16 overflow-y-auto">
                    -
                </div>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-slate-800 border-t border-slate-700 flex justify-center pb-6">
        <button onclick="processDotMatrixOCR()" class="w-full max-w-sm bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-6 rounded-xl text-sm flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
            <i class="fas fa-expand text-base"></i> BIDIK & PROSES DT NO
        </button>
    </footer>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('captureCanvas');
        const resultDiv = document.getElementById('resultText');
        const rawLogDiv = document.getElementById('rawLog');
        const loader = document.getElementById('ocrLoader');

        async function startCamera() {
            try {
                const constraints = {
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                };
                video.srcObject = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(stream => { video.srcObject = stream; })
                    .catch(e => { resultDiv.innerText = "Kamera diblokir!"; });
            }
        }
        window.addEventListener('DOMContentLoaded', startCamera);

        function processDotMatrixOCR() {
            loader.classList.remove('hidden');
            resultDiv.innerText = "Scanning...";
            
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            
            // 1. Ambil gambar dari video stream
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 2. PREPROCESSING ALGORITMA: Paksa gambar menjadi kontras tinggi hitam-putih (Thresholding)
            // Ini krusial agar titik-titik renggang dari printer pita menyatu menjadi bentuk angka solid
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                // Rumus konversi kecerahan warna (Grayscale)
                const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                // Threshold nilai 120: Di bawah 120 jadi hitam pekat, di atas jadi putih bersih
                const v = (brightness < 120) ? 0 : 255;
                data[i] = v;     // Red
                data[i + 1] = v; // Green
                data[i + 2] = v; // Blue
            }
            ctx.putImageData(imgData, 0, 0);

            // Kirim gambar hasil pembersihan ke Engine AI
            const processedDataUrl = canvas.toDataURL('image/png');

            Tesseract.recognize(
                processedDataUrl,
                'eng',
                { logger: m => console.log(m) }
            ).then(({ data: { text } }) => {
                rawLogDiv.innerText = text; // Tampilkan teks mentah hasil tangkapan AI untuk evaluasi
                
                // Normalisasi teks: Ubah ke huruf besar dan bersihkan spasi
                let cleanText = text.toUpperCase().replace(/\s+/g, ' ');
                
                // LOGIKA JANGKAR "DT NO": Cari keberadaan string DT NO, DT, atau NO
                let anchorKeywords = ["DT NO", "DTNO", "DT .NO", "TICKET", "DT", "NO"];
                let foundIndex = -1;
                let usedKeyword = "";

                for (let keyword of anchorKeywords) {
                    let idx = cleanText.indexOf(keyword);
                    if (idx !== -1) {
                        foundIndex = idx;
                        usedKeyword = keyword;
                        break;
                    }
                }

                if (foundIndex !== -1) {
                    // Ambil seluruh teks setelah kata kunci "DT NO"
                    let textAfterAnchor = cleanText.substring(foundIndex + usedKeyword.length);
                    // Ambil kumpulan angka pertama yang muncul setelah kata jangkar tersebut
                    let matchedNumbers = textAfterAnchor.match(/\d+/);
                    
                    if (matchedNumbers && matchedNumbers[0].length >= 5) {
                        resultDiv.innerHTML = `<span class="text-2xl text-emerald-400 font-extrabold tracking-widest">${matchedNumbers[0]}</span>`;
                        return;
                    }
                }

                // Fallback: Jika kata "DT NO" tidak terbaca akibat kertas buram, ambil angka acak terpanjang yang ada di area jepretan
                let anyNumbers = cleanText.match(/\d+/g);
                if (anyNumbers) {
                    // Cari baris angka yang memiliki digit paling panjang (biasanya nomor tiket pengiriman)
                    let longestNumber = anyNumbers.reduce((a, b) => a.length > b.length ? a : b, "");
                    if (longestNumber.length >= 5) {
                        resultDiv.innerHTML = `<span class="text-xl text-amber-400 font-extrabold tracking-widest">${longestNumber}</span><br><span class="text-[9px] text-amber-500 block mt-0.5">(Terbaca tanpa trigger jangkar)</span>`;
                        return;
                    }
                }

                resultDiv.innerHTML = `<span class="text-xs text-amber-500">Gagal mendeteksi nomor DT. Pastikan kertas tegak lurus & lampu terang.</span>`;
            }).catch(error => {
                resultDiv.innerHTML = `<span class="text-xs text-red-500">Error: ${error.message}</span>`;
            }).finally(() => {
                loader.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
