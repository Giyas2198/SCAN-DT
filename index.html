<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JO-TRANS | Snapshot OCR Dot-Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between antialiased font-sans">

    <header class="bg-slate-800 p-3.5 border-b border-slate-700 text-center shadow-md">
        <h1 class="text-xs font-black tracking-wider text-blue-400 uppercase">
            <i class="fas fa-camera-retro mr-1.5"></i> SNAPSHOT DT SCANNER
        </h1>
        <p class="text-[10px] text-slate-400 mt-1">Metode Tangkap Gambar Terbimbing - PT Jotun</p>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4">
        
        <div class="relative w-full max-w-sm aspect-[4/3] bg-black rounded-2xl overflow-hidden border-2 border-slate-700 shadow-2xl flex items-center justify-center">
            
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
            
            <img id="photoPreview" class="hidden w-full h-full object-cover bg-white" />

            <div id="targetBox" class="absolute inset-x-6 h-20 border-2 border-dashed border-blue-500 rounded-lg bg-blue-500/5 flex flex-col items-center justify-between pointer-events-none p-1.5">
                <span class="text-[9px] text-blue-400 font-bold uppercase tracking-wider bg-slate-900/90 px-1.5 py-0.5 rounded">Posisikan Teks "DT NO" di dalam kotak ini</span>
                <div class="w-full h-0.5 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse"></div>
            </div>

            <div id="ocrLoader" class="hidden absolute inset-0 bg-slate-950/85 backdrop-blur-sm flex flex-col items-center justify-center gap-3">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-xs font-bold text-blue-400 tracking-wider uppercase animate-pulse">AI Mengekstrak Tulisan Printer...</span>
            </div>
        </div>

        <canvas id="captureCanvas" class="hidden"></canvas>

        <div class="w-full max-w-sm mt-5 bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-2.5">
            <div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Nomor DT Hasil Ekstraksi:</span>
                <div id="resultText" class="text-2xl font-black tracking-widest text-emerald-400 bg-slate-950/60 p-2.5 rounded-lg border border-slate-900 text-center min-h-[48px] flex items-center justify-center">
                    Siap membidik kertas
                </div>
            </div>
            <div>
                <span class="text-[9px] font-medium text-slate-500 block">Log Teks Mentah Terbaca:</span>
                <div id="rawLog" class="text-[10px] text-slate-400 font-mono bg-slate-900 p-1.5 rounded max-h-12 overflow-y-auto">
                    -
                </div>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-slate-800 border-t border-slate-700 pb-6 flex justify-center">
        <div class="w-full max-w-sm flex gap-2">
            <button id="btnAction" onclick="captureSnapshot()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-xl text-xs flex items-center justify-center gap-2 shadow-md transition-all active:scale-95">
                <i class="fas fa-camera text-sm"></i> JEPRET FOTO DT
            </button>
            
            <button id="btnProcess" onclick="analyzePhotoWithAI()" class="hidden flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl text-xs flex items-center justify-center gap-2 shadow-md transition-all active:scale-95">
                <i class="fas fa-brain text-sm"></i> PROSES BACA ANGKA
            </button>
        </div>
    </footer>

    <script>
        const video = document.getElementById('webcam');
        const imgPreview = document.getElementById('photoPreview');
        const canvas = document.getElementById('captureCanvas');
        const resultDiv = document.getElementById('resultText');
        const rawLogDiv = document.getElementById('rawLog');
        const loader = document.getElementById('ocrLoader');
        const targetBox = document.getElementById('targetBox');
        
        const btnAction = document.getElementById('btnAction');
        const btnProcess = document.getElementById('btnProcess');

        let isPhotoTaken = false;

        // 1. AKTIFKAN DRIVER KAMERA BELAKANG
        async function startCamera() {
            try {
                const constraints = {
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                };
                video.srcObject = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(stream => { video.srcObject = stream; })
                    .catch(e => { resultDiv.innerText = "Akses kamera diblokir browser!"; });
            }
        }
        window.addEventListener('DOMContentLoaded', startCamera);

        // 2. FUNGSI MENANGKAP GAMBAR (MEMBEKUKAN FRAME)
        function captureSnapshot() {
            if (!isPhotoTaken) {
                // Ambil data resolusi asli kamera saat ini
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                const ctx = canvas.getContext('2d');
                
                // Gambar video ke kanvas
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Tampilkan hasil tangkapan ke elemen Image Preview
                const dataUrl = canvas.toDataURL('image/png');
                imgPreview.src = dataUrl;
                
                // Ubah Tampilan Interface (Kamera Sembunyikan, Preview Munculkan)
                video.classList.add('hidden');
                imgPreview.classList.remove('hidden');
                targetBox.classList.add('hidden'); // Sembunyikan garis kotak target agar nyaman dilihat
                
                // Ubah Fungsi Tombol
                btnAction.innerHTML = `<i class="fas fa-rotate-left"></i> FOTO ULANG`;
                btnAction.classList.replace('bg-blue-600', 'bg-slate-600');
                btnAction.classList.replace('hover:bg-blue-500', 'hover:bg-slate-500');
                btnProcess.classList.remove('hidden'); // Munculkan tombol eksekusi AI
                
                isPhotoTaken = true;
                resultDiv.innerText = "Foto terkunci. Silakan klik tombol hijau!";
            } else {
                // Kembalikan ke mode live camera (Foto Ulang)
                video.classList.remove('hidden');
                imgPreview.classList.add('hidden');
                targetBox.classList.remove('hidden');
                
                btnAction.innerHTML = `<i class="fas fa-camera"></i> JEPRET FOTO DT`;
                btnAction.classList.replace('bg-slate-600', 'bg-blue-600');
                btnAction.classList.replace('hover:bg-slate-500', 'hover:bg-blue-500');
                btnProcess.classList.add('hidden');
                
                isPhotoTaken = false;
                resultDiv.innerText = "Siap membidik kertas kembali";
            }
        }

        // 3. LOGIKA AI PREPROCESSING & FILTERING DOT-MATRIX KHUSUS JOTUN
        function analyzePhotoWithAI() {
            loader.classList.remove('hidden');
            resultDiv.innerText = "AI sedang membaca...";

            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            // PENAJAMAN AGRESIF BINARY THRESHOLDING
            // Memaksa kumpulan titik tinta dot-matrix yang renggang menyatu tebal hitam pekat
            for (let i = 0; i < data.length; i += 4) {
                const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                // Menggunakan threshold kontras menengah (128): Jika abu-abu pekat langsung dihantam hitam solid
                const binaryValue = (gray < 130) ? 0 : 255; 
                data[i] = binaryValue;
                data[i + 1] = binaryValue;
                data[i + 2] = binaryValue;
            }
            ctx.putImageData(imgData, 0, 0);

            // Kirim gambar modifikasi hitam-putih pekat ke Tesseract
            const cleanDataUrl = canvas.toDataURL('image/png');

            Tesseract.recognize(
                cleanDataUrl,
                'eng',
                { logger: m => console.log(m) }
            ).then(({ data: { text } }) => {
                rawLogDiv.innerText = text;
                
                // Normalisasi teks hasil jepretan
                let cleanText = text.toUpperCase().replace(/\s+/g, ' ');
                
                // EKSTRAKSI BERBASIS TRIGGER JANGKAR "DT NO"
                let keywords = ["DT NO", "DTNO", "DT.NO", "DT .NO", "DELIVERY TICKET", "DT", "NO"];
                let foundIndex = -1;
                let matchedKeyword = "";

                for (let kw of keywords) {
                    let index = cleanText.indexOf(kw);
                    if (index !== -1) {
                        foundIndex = index;
                        matchedKeyword = kw;
                        break;
                    }
                }

                if (foundIndex !== -1) {
                    // Ambil string teks di sebelah/di bawah kata kunci jangkar DT NO
                    let portionAfterAnchor = cleanText.substring(foundIndex + matchedKeyword.length);
                    let extraction = portionAfterAnchor.match(/\d+/); // Ambil rentetan angka terdekat
                    
                    if (extraction && extraction[0].length >= 5) {
                        resultDiv.innerHTML = `<span class="text-3xl text-emerald-400 font-extrabold tracking-widest">${extraction[0]}</span>`;
                        return;
                    }
                }

                // CADANGAN GAGAL JANGKAR: Jika kata "DT NO" terpotong, ambil angka terpanjang di kertas cetakan
                let backupMatch = cleanText.match(/\d+/g);
                if (backupMatch) {
                    let finalNumber = backupMatch.reduce((a, b) => a.length > b.length ? a : b, "");
                    if (finalNumber.length >= 5) {
                        resultDiv.innerHTML = `<span class="text-2xl text-amber-400 font-extrabold tracking-widest">${finalNumber}</span><br><span class="text-[9px] text-amber-500 block mt-0.5">(Terbaca via deteksi angka terpanjang otomatis)</span>`;
                        return;
                    }
                }

                resultDiv.innerHTML = `<span class="text-xs text-amber-500">Angka dot-matrix tidak terbaca jelas. Coba ulangi jepret foto dengan lebih dekat & tegak lurus.</span>`;
            }).catch(error => {
                resultDiv.innerHTML = `<span class="text-xs text-red-500">Error: ${error.message}</span>`;
            }).finally(() => {
                loader.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
